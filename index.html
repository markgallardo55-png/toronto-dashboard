<style>
:root{color-scheme:light only;--bg-000:rgb(255,255,255);--bg-100:rgb(250,249,245);--bg-200:rgb(245,244,237);--bg-300:rgb(240,238,230);--bg-400:rgb(232,230,220);--text-100:rgb(20,20,19);--text-200:rgb(61,61,58);--text-400:rgb(115,114,108);--border:rgba(31,30,29,0.12);--border-med:rgba(31,30,29,0.18);--border-strong:rgba(31,30,29,0.28);--danger:rgb(181,51,51);--danger-bg:rgba(181,51,51,0.08);--danger-border:rgba(181,51,51,0.25);--accent-coral:rgb(207,92,54);--font:"Anthropic Sans",system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;--radius-sm:8px;--radius-md:12px;--radius-lg:16px}

.card-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;color:var(--text-400)}

.card-high{font-size:22px;font-weight:600;display:block;line-height:1}

.temp-bar-wrap{margin-top:8px;height:3px;border-radius:2px;background:var(--bg-400);position:relative;overflow:hidden}

.pill-slot{border-radius:6px;display:flex;flex-direction:column;justify-content:center;padding:6px 8px;overflow:hidden}

.tod-card{padding:16px 14px;border-right:1px solid var(--border);position:relative;background:var(--bg-000)}

.tod-score{font-size:11px;font-weight:600;margin-top:5px}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border)}
.detail-col{padding:18px 16px;border-right:1px solid var(--border)}
.detail-col:last-child{border-right:none}
.detail-col-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:600;color:var(--text-400);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.jacket-icon{font-size:30px;margin-bottom:10px;display:block}

.layer-value{color:var(--text-100);font-weight:500;line-height:1.4}
.layer-acc{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;margin-bottom:4px}
.layer-acc-pill{font-size:10px;padding:3px 8px;border-radius:20px;background:var(--bg-300);color:var(--text-200);font-weight:500}
.layer-row{display:flex;align-items:baseline;gap:6px;margin-bottom:6px;font-size:12px}
.layer-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;color:var(--text-400);width:36px;flex-shrink:0}

.layer-acc{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}

.jacket-text{font-size:14px;font-weight:600;color:var(--text-100);line-height:1.4;margin-bottom:12px}
.jacket-stat{font-size:12px;color:var(--text-400);margin-bottom:4px}

.event-time{font-size:11px;color:var(--text-400)}

.stat-box{background:var(--bg-000);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}

.event-item-title{font-size:13px;font-weight:500;color:var(--text-100);margin-bottom:3px;line-height:1.3}

// Helpers
function eventsFor(d){return EVENTS.filter(e=>e.date===d&&e.calendar!=="Birthdays")}
function remindersFor(d){return REMINDERS.filter(r=>r.date===d)}
function cityEventsFor(d){return CITY_BY_DATE[d]||[]}
function windChill(temp,wind){if(temp>10||wind<5)return temp;return Math.round(13.12+0.6215*temp-11.37*Math.pow(wind,0.16)+0.3965*temp*Math.pow(wind,0.16))}
function walkScore(precip,wind,temp,alert,wc){
  let s=100;if(alert)s-=50;
  if(wc!=null){if([95,96,99].includes(wc))s-=60;else if([65,75,82,86].includes(wc))s-=45;else if([61,71,80,85].includes(wc))s-=30;else if([63,73,81].includes(wc))s-=20;else if([51,53,55,77].includes(wc))s-=12;else if([45,48].includes(wc))s-=15;else if(wc===3)s-=5;}
  else{if(precip>=80)s-=40;else if(precip>=60)s-=25;else if(precip>=40)s-=15;else if(precip>=20)s-=8;}
  const felt=windChill(temp,wind);
  if(temp<=10){if(felt<=-20)s-=45;else if(felt<=-15)s-=35;else if(felt<=-10)s-=22;else if(felt<=-5)s-=12;else if(felt<=-2)s-=6;if(wind>=50)s-=10;else if(wind>=35)s-=5;}
  else{if(wind>=50)s-=25;else if(wind>=35)s-=15;else if(wind>=25)s-=8;else if(wind>=18)s-=3;
  // Pleasant temp bonus only if it's not raining/snowing/foggy
  const wetCodesForBonus=[45,48,51,53,55,56,57,61,63,65,66,67,71,73,75,77,80,81,82,85,86,95,96,99];
  const isWetForBonus = wc!=null && wetCodesForBonus.includes(wc);
  if(temp>=10&&temp<=22&&!isWetForBonus&&precip<30)s+=8;
}
  return Math.max(0,Math.min(100,s));
}
function ratingFromScore(s, wc=null){
  // Wet-weather hard cap: if it's actively raining/snowing/storming,
  // cap label at "Decent" — common sense override regardless of score
  const wetHazardCodes=[51,53,55,56,57,61,63,65,66,67,71,73,75,80,81,82,85,86,95,96,99];
  const isWet = wc!=null && wetHazardCodes.includes(wc);

  if(s>=75 && !isWet) return{label:"Great", cls:"walk-great",dot:"rgb(34,112,49)", paw:"🐾🐾🐾",bar:"rgb(34,112,49)"};
  if(s>=75 &&  isWet) return{label:"Decent",cls:"walk-decent",dot:"rgb(160,100,0)",paw:"🐾🐾",  bar:"rgb(160,100,0)"};
  if(s>=50)           return{label:"Decent",cls:"walk-decent",dot:"rgb(160,100,0)",paw:"🐾🐾",  bar:"rgb(160,100,0)"};
  if(s>=25)           return{label:"Tough", cls:"walk-tough", dot:"rgb(180,80,0)", paw:"🐾",    bar:"rgb(180,80,0)"};
  return              {label:"Skip",  cls:"walk-skip",  dot:"rgb(181,51,51)",paw:"🚫",    bar:"rgb(181,51,51)"};
}
  function walkInfo(day, tod=null){
  // Fix 1 & 5: Use ToD slot temp if provided, else fall back to daily high
  const t=tod||day;
  const temp=tod?tod.temp:day.high;
  const wind=tod?tod.wind:day.wind;
  const precip=tod?tod.precip:day.precip;
  const wc=tod?(tod.weathercode??null):(day.weathercode??null);
  const alert=(tod?tod.alert:day.alert)||false;
  const s=walkScore(precip,wind,temp,alert,wc);
  const r=ratingFromScore(s,wc);
  const felt=windChill(temp,wind);
  const fs=felt<temp?` (feels ${felt}°)`:"";

  // ── Three-layer system (Arc'teryx: base · mid · shell) ──────────────────────
  const wetCodes=[51,53,55,61,63,65,71,73,75,77,80,81,82,85,86,95,96,99];
  const snowCodes=[71,73,75,77,85,86];
  const isWet=wetCodes.includes(wc);
  const isSnowIce=snowCodes.includes(wc)||alert;
  const isVeryWet=[61,63,65,80,81,82,95,96,99].includes(wc)||alert;

  // Layer 1 — Base:
  // Rho SV: technical fleece base — worn under mid+shell on cold/wet days
  // Casual crewneck: base layer on cool days (can also be mid on mild days)
  // T-shirt: warm days only
  let base=null;
  if(felt<=-8)       base="Rho SV Zip Neck — technical fleece base";
  else if(felt<=-2)  base="Rho SV Zip Neck";
  else if(felt<=5)   base="Rho SV Zip Neck or casual crewneck";
  else if(temp<=12)  base="T-shirt or casual crewneck";
  else               base="T-shirt";

  // Layer 2 — Mid or standalone outer:
  // Cerium: 850-fill down + Coreloft — mid layer, shell CAN go over it ✓
  // Denali: heavyweight Polartec fleece — mid layer, shell CANNOT go over it ✗ (standalone)
  // RC Forum: 800-fill down bomber — mid layer, shell CANNOT go over it ✗ (city standalone)
  // Tonal Puffer: thick synthetic puffer — STANDALONE OUTER only, no shell, no mid ✗
  //   → When wet: Tonal Puffer handles light damp standalone; for heavy rain use Cerium+Beta
  //   → Best range: 2–12°C dry or light damp
  let mid=null;
  if(felt<=-15)      mid=isWet?"Cerium Jacket under Beta":"Cerium under Beta — or RC Forum standalone";
  else if(felt<=-8)  mid=isWet?"Cerium Jacket under Beta":"Cerium under Beta — or Denali / RC Forum standalone";
  else if(felt<=-2)  mid=isWet?"Cerium under Beta":"Cerium under Beta — or Denali / RC Forum standalone";
  else if(felt<=5)   mid=isWet?"Cerium under Beta — or Tonal Puffer standalone":"Denali or RC Forum standalone — or Cerium under Beta";
  else if(temp<=12)  mid=isWet?"Tonal Puffer — handles light damp (standalone)":"Tonal Puffer or Denali — standalone";
  // Skip mid above 12°

  // Layer 3 — Shell: Beta (heavy, cold/serious weather) or Adidas Paclite (light, mild wet days)
  // Beta: GORE-TEX ePE, 80D face, fully waterproof + windproof, warm-feeling C-KNIT backer
  // Paclite: GORE-TEX 2.5-layer, ultralight, packable — pure weather protection, no thermal contribution
  // Shell only valid over Cerium. Denali, RC Forum, and Tonal Puffer are all no-shell layers.
  const midIsNoShell = mid && (mid.includes("RC Forum") || mid.includes("Tonal Puffer") || mid.includes("Denali"));
  const midAcceptsShell = !midIsNoShell;
  let shell=null;
  if(midAcceptsShell){
    if(isVeryWet&&felt<=-2)   shell="Beta Jacket — full GORE-TEX for cold wet conditions";
    else if(isVeryWet)         shell="Adidas Paclite or Beta Jacket — both handle this";
    else if(isWet&&felt<=-2)   shell="Beta Jacket — keeps Cerium dry + adds warmth";
    else if(isWet)             shell="Adidas Paclite — light rain, leave the Beta at home";
    else if(wind>=35&&felt<=-2)shell="Beta Jacket — windproof in cold wind";
    else if(wind>=35)          shell="Adidas Paclite or Beta — wind block either way";
    else if(felt<=-8)          shell="Beta Jacket — adds warmth + wind block";
    else if(felt<=-2)          shell="Beta Jacket optional — adds warmth";
    else if(temp>=14)          shell=null;
  }

  // Accessories
  let acc=[];
  if(felt<=-15)      acc=["Balaclava","Mitts","Waterproof boots"];
  else if(felt<=-8)  acc=isSnowIce?["Toque","Mitts","Waterproof boots"]:["Toque","Mitts"];
  else if(felt<=-2)  acc=["Toque","Gloves"];
  else if(felt<=5)   acc=["Hat","Light gloves"];

  const layers={base,mid,shell,acc};

  // Legacy single-line for wind note (still used in milo tip context)
  let windNote="";
  if(wind>=40) windNote=" · windproof layer essential";
  else if(wind>=30) windNote=" · windproof layer recommended";

  // Tier pill
  let tier;
  if(felt<=-15)       tier={label:"Arctic",cls:"tier-arctic",dot:"rgb(59,130,246)", temp:`feels ${felt}°`};
  else if(felt<=-8)   tier={label:"Cold",  cls:"tier-cold",  dot:"rgb(96,165,250)", temp:`feels ${felt}°`};
  else if(felt<=-2)   tier={label:"Cool",  cls:"tier-cool",  dot:"rgb(20,184,166)", temp:`feels ${felt}°`};
  else if(temp<=15)   tier={label:"Mild",  cls:"tier-mild",  dot:"rgb(34,197,94)",  temp:`${temp}°`};
  else                tier={label:"Warm",  cls:"tier-warm",  dot:"rgb(251,191,36)", temp:`${temp}°`};

  const mr=s>=75?"great":s>=50?"ok":s>=25?"rough":"skip";
  // Fix 4 (salt): Only mention salt/booties on snow/ice codes
  const msgs={
    great:`Good conditions for a walk${fs}. Paws up! 🐾`,
    ok:`Quick walk is fine${fs}. Watch for ${isWet?"wet paws":"icy patches"}.`,
    rough:`Short walk only${fs}. ${isSnowIce?"Salt on sidewalks — wipe paws after.":"Keep it brief."}`,
    skip:`Stay cozy inside${fs}. ${isSnowIce?"Booties recommended — ice & salt on sidewalks.":"Quick bathroom break only!"}`
  };
  return{score:s,felt,tier,layers,...r,milo:msgs[mr]};
}
function tempColor(t){if(t<=-10)return"rgb(96,130,220)";if(t<=0)return"rgb(80,140,210)";if(t<=5)return"rgb(60,120,180)";if(t<=12)return"rgb(160,100,0)";if(t<=20)return"rgb(180,80,0)";return"rgb(181,51,51)"}
function uvLabel(u){return(["Low","Low","Moderate","Moderate","High","High","High","Very High"][Math.min(u,7)])||"Low"}
function windLabel(w){if(w<=10)return{label:"Calm",cls:"w-calm"};if(w<=20)return{label:"Light breeze",cls:"w-light"};if(w<=30)return{label:"Breezy",cls:"w-breezy"};if(w<=40)return{label:"Windy",cls:"w-windy"};if(w<=55)return{label:"Very windy",cls:"w-vwindy"};return{label:"Strong wind",cls:"w-strong"};}
function windPill(w){const wl=windLabel(w);return`<span class="wind-pill ${wl.cls}">${wl.label}</span>`;}
function mapsLink(q,l){return`<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}" target="_blank" style="color:inherit;border-bottom:1px solid rgba(31,30,29,0.2);text-decoration:none">${l}</a>`}
function rgba(rgb,a){return rgb.replace('rgb(','rgba(').replace(')',`,${a})`)}

const minAll=Math.min(...DAYS.map(d=>d.low)),maxAll=Math.max(...DAYS.map(d=>d.high)),span=maxAll-minAll||1;

function renderCards(){
  const row=document.getElementById("cards-row");row.innerHTML="";
  DAYS.forEach((day,i)=>{
    const evs=eventsFor(day.date),isSel=i===sel,isAlert=!!day.alert;
    const bl=(day.low-minAll)/span*55+15,bw=Math.max((day.high-day.low)/span*50+10,8);
    const dateStr=new Date(day.date+"T12:00:00").toLocaleDateString("en-CA",{month:"short",day:"numeric"});
    const todDots=day.tod.map(t=>`<div class="walk-dot" style="background:${ratingFromScore(walkScore(t.precip,t.wind,t.temp,t.alert||false,t.weathercode??null),t.weathercode??null).dot}"></div>`).join("");
    let pills="";
    const rems=remindersFor(day.date).filter(r=>!r.overdue);
    const allPills=[
      ...evs.map(e=>({type:"event",item:e})),
      ...rems.map(r=>({type:"reminder",item:r}))
    ];
    const maxPills=2;
    for(let s2=0;s2<maxPills;s2++){
      const p=allPills[s2];
      if(p&&p.type==="event"){const ev=p.item;const t=ev.time?ev.time.replace(" AM","a").replace(" PM","p"):"";const title=ev.title.replace(/[🎵☘️🇵🇭]/g,"").trim();pills+=`<div class="pill-slot" style="background:${rgba(ev.color,0.1)};border:1px solid ${rgba(ev.color,0.2)}"><span class="pill-time">${t}</span><span class="pill-title">${title}</span></div>`;}
      else if(p&&p.type==="reminder"){const r=p.item;const dot=r.overdue?"⚠️":"🔔";pills+=`<div class="pill-slot" style="background:${rgba(r.color,0.08)};border:1px solid ${rgba(r.color,0.2)}"><span class="pill-time">${dot} ${r.list}</span><span class="pill-title">${r.title}</span></div>`;}
      else{pills+=`<div class="pill-slot" style="background:transparent"></div>`;}
    }
    if(allPills.length>maxPills)pills+=`<div style="font-size:9px;color:var(--text-400);text-align:center;margin-top:2px">+${allPills.length-maxPills} more</div>`;
    const card=document.createElement("div");card.className=`day-card${isSel?" selected":""}${isAlert?" alert-day":""}`;
    card.innerHTML=`<div style="margin-bottom:8px"><div class="card-label">${day.label}</div><div class="card-date">${dateStr}</div></div><span class="card-icon">${day.icon}</span><span class="card-high" style="color:${tempColor(day.high)}">${day.high}°</span><span class="card-low">${day.low}°</span><div class="temp-bar-wrap"><div class="temp-bar" style="left:${bl}%;width:${bw}%"></div></div><div style="display:flex;justify-content:space-between;margin-top:3px"><span style="font-size:8px;color:var(--text-400)">${minAll}°</span><span style="font-size:8px;color:var(--text-400)">${maxAll}°</span></div><div class="walk-dot-wrap">${todDots}</div><div class="dot-label">AM · PM · EVE</div><div class="pills-area">${pills}</div>`;
    card.addEventListener("click",()=>{sel=i;selTod=null;renderCards();renderDetail();renderStats();setTimeout(()=>document.getElementById("detail").scrollIntoView({behavior:"smooth",block:"nearest"}),30);});
    row.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// ██████  LIVE WEATHER — Open-Meteo fetch on every page load  ██████
// ═══════════════════════════════════════════════════════════════════════════════
//
// Open-Meteo API docs: https://open-meteo.com/en/docs
// Free, no API key required, CORS-enabled for browser use.
// We fetch daily + hourly for 7 days, then aggregate hourly into
// Morning (6am–12pm) / Afternoon (12pm–6pm) / Evening (6pm–10pm) using averages.

// WMO weathercode → emoji icon + human label
// Codes: https://open-meteo.com/en/docs (scroll to "WMO Weather interpretation codes")
function wcToIconCond(wc){
  if(wc===0)                             return {icon:"☀️",   cond:"Clear"};
  if(wc===1||wc===2)                     return {icon:"⛅",   cond:"Partly cloudy"};
  if(wc===3)                             return {icon:"☁️",   cond:"Cloudy"};
  if(wc===45||wc===48)                   return {icon:"🌫️", cond:"Fog"};
  if(wc===51||wc===53||wc===55)          return {icon:"🌦️", cond:"Drizzle"};
  if(wc===56||wc===57)                   return {icon:"🌨️", cond:"Freezing drizzle"};
  if(wc===61||wc===63)                   return {icon:"🌧️", cond:"Rain"};
  if(wc===65)                            return {icon:"🌧️", cond:"Heavy rain"};
  if(wc===66||wc===67)                   return {icon:"🌨️", cond:"Freezing rain"};
  if(wc===71||wc===73)                   return {icon:"🌨️", cond:"Snow"};
  if(wc===75)                            return {icon:"❄️",   cond:"Heavy snow"};
  if(wc===77)                            return {icon:"🌨️", cond:"Snow grains"};
  if(wc===80||wc===81)                   return {icon:"🌦️", cond:"Rain showers"};
  if(wc===82)                            return {icon:"🌧️", cond:"Heavy showers"};
  if(wc===85||wc===86)                   return {icon:"🌨️", cond:"Snow showers"};
  if(wc===95)                            return {icon:"⛈️", cond:"Thunderstorm"};
  if(wc===96||wc===99)                   return {icon:"⛈️", cond:"Thunderstorm w/ hail"};
  return {icon:"❔", cond:"Unknown"};
}

// Average a numeric array (used for Morning/Afternoon/Evening aggregation)
function avg(arr){ return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }

// Most-common weathercode in an array (for the "representative" code of a window)
function modeWc(arr){
  const counts={}; let best=arr[0]||0, bestN=0;
  for(const w of arr){ counts[w]=(counts[w]||0)+1; if(counts[w]>bestN){bestN=counts[w];best=w;} }
  return best;
}

// Worst-case weathercode in an array — picks whichever hourly code carries
// the biggest walk-score penalty. Used so a single rainy hour in an otherwise
// cloudy window still gets surfaced (rather than averaged away).
function worstWc(arr){
  // Severity order matches the penalties in walkScore() — higher index = worse
  const rank = wc => {
    if([95,96,99].includes(wc)) return 9;             // thunderstorm
    if([65,75,82,86].includes(wc)) return 8;          // heavy rain/snow showers
    if([61,71,80,85].includes(wc)) return 7;          // rain/snow/showers
    if([63,73,81].includes(wc)) return 6;             // moderate rain/snow
    if([45,48].includes(wc)) return 5;                // fog
    if([51,53,55,77].includes(wc)) return 4;          // drizzle, snow grains
    if([56,57,66,67].includes(wc)) return 4;          // freezing drizzle/rain
    if(wc===3) return 3;                              // overcast
    if(wc===1||wc===2) return 2;                      // partly cloudy
    if(wc===0) return 1;                              // clear
    return 0;
  };
  let worst = arr[0]||0, worstRank = rank(worst);
  for(const w of arr){
    const r = rank(w);
    if(r > worstRank){ worstRank = r; worst = w; }
  }
  return worst;
}

// Short weekday label for card header ("Fri", "Sat", …) or "Today" for index 0
function dayLabel(dateStr, idx){
  if(idx===0) return "Today";
  const d = new Date(dateStr+"T12:00:00");
  return d.toLocaleDateString("en-CA",{weekday:"short"});
}

// Transform Open-Meteo JSON response into our DAYS array shape
function buildDaysFromOpenMeteo(data){
  const d = data.daily, h = data.hourly;
  const out = [];
  for(let i=0;i<d.time.length;i++){
    const date = d.time[i];
    const dailyWc = d.weathercode[i];
    const dailyIconCond = wcToIconCond(dailyWc);

    // Gather this day's hourly indices
    const hourIdx = [];
    for(let j=0;j<h.time.length;j++){
      if(h.time[j].startsWith(date)) hourIdx.push(j);
    }
    // Split into Morning (6–12), Afternoon (12–18), Evening (18–22)
    // Use worst-case (max) for wind/precip/weathercode so rain-during-1-hour
    // doesn't get hidden by 5 dry hours. Temp stays as average — it's a smooth metric.
    const slot = (from, to) => {
      const idx = hourIdx.filter(j=>{
        const hr = parseInt(h.time[j].slice(11,13),10);
        return hr>=from && hr<to;
      });
      const temp = avg(idx.map(j=>h.temperature_2m[j]));
      const wind = Math.max(0, ...idx.map(j=>h.windspeed_10m[j]));
      const precip = Math.max(0, ...idx.map(j=>h.precipitation_probability[j]||0));
      const wc = worstWc(idx.map(j=>h.weathercode[j]));
      const ic = wcToIconCond(wc);
      return {temp,wind:Math.round(wind),precip:Math.round(precip),weathercode:wc,icon:ic.icon,condition:ic.cond};
    };
    const m = slot(6,12), a = slot(12,18), e = slot(18,22);

    out.push({
      date,
      label: dayLabel(date, i),
      high: Math.round(d.temperature_2m_max[i]),
      low:  Math.round(d.temperature_2m_min[i]),
      condition: dailyIconCond.cond,
      icon: dailyIconCond.icon,
      precip: Math.round(d.precipitation_probability_max[i]||0),
      wind:   Math.round(d.windspeed_10m_max[i]||0),
      uv:     Math.round(d.uv_index_max[i]||0),
      weathercode: dailyWc,
      tod: [
        {period:"Morning",  ...m},
        {period:"Afternoon",...a},
        {period:"Evening",  ...e},
      ]
    });
  }
  return out;
}

// Update CURRENT from the first hourly reading (≈ "right now")
function buildCurrentFromOpenMeteo(data){
  const h = data.hourly;
  // Find the hour index closest to "now"
  const now = new Date();
  let closestIdx = 0, closestDelta = Infinity;
  for(let i=0;i<h.time.length;i++){
    const t = new Date(h.time[i]);
    const delta = Math.abs(t - now);
    if(delta < closestDelta){ closestDelta = delta; closestIdx = i; }
  }
  const temp = Math.round(h.temperature_2m[closestIdx]);
  const wind = Math.round(h.windspeed_10m[closestIdx]);
  const ic = wcToIconCond(h.weathercode[closestIdx]);
  const stamp = now.toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric"})
              + " · " + now.toLocaleTimeString("en-CA",{hour:"numeric",minute:"2-digit"});
  return {
    temp: `${temp}°C`,
    cond: `${ic.icon} ${ic.cond}`,
    wind: `${wind} km/h · 🇨🇦 Toronto`,
    refreshed: stamp
  };
}

// The main async boot: fetch weather → populate DAYS/CURRENT → render everything.
// If the fetch fails, render with the fallback so the page never sits blank.
async function bootDashboard(){
  const url = "https://api.open-meteo.com/v1/forecast"
    + "?latitude=43.64&longitude=-79.38"
    + "&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max,windspeed_10m_max,uv_index_max"
    + "&hourly=temperature_2m,weathercode,precipitation_probability,windspeed_10m"
    + "&timezone=America/Toronto"
    + "&forecast_days=7";
  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    DAYS = buildDaysFromOpenMeteo(data);
    CURRENT = buildCurrentFromOpenMeteo(data);
  }catch(err){
    console.error("Open-Meteo fetch failed, using fallback:", err);
    // CURRENT/DAYS keep their fallback values; add a note to the footer
    CURRENT.refreshed = "⚠️ Live fetch failed — showing fallback · " + new Date().toLocaleString();
  }

  // Paint the header
  document.getElementById("cur-temp").textContent=CURRENT.temp;
  document.getElementById("cur-cond").textContent=CURRENT.cond;
  document.getElementById("cur-wind").textContent=CURRENT.wind;
  document.getElementById("footer").textContent="Open-Meteo · "+CURRENT.refreshed;

  // Render everything that depends on DAYS
  renderCards(); renderDetail(); renderStats(); renderSports(); renderCityEvents(); renderFood();

  // Auto-append wind label to header
  const wl=windLabel(DAYS[0].wind);
  const el=document.getElementById("cur-wind");
  if(el&&!el.textContent.includes(wl.label)) el.textContent=el.textContent+" · "+wl.label;
}

bootDashboard();
</script>
